<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Free Claude Code Admin</title>
    <link rel="icon" href="data:," />

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS v4 browser build (runtime, no build step) -->
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1"
      integrity="sha384-OT3qnPBOZ0Z1BVC2R6WSI4cjBlIoSMeeZAUY8gZqaP1TgAJHbuo2gIM6KzQ8/viI"
      crossorigin="anonymous"
    ></script>

    <!-- Alpine.js v3 (deferred — runs after document parsed) -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"
      integrity="sha384-pb6hrQvo4s23cEUFtj0CZkzGE3jyK3pj26RIupXXxhSrrcUA/Cn0lZgcCrGH0t6L"
      crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="/admin/assets/admin.css" />
  </head>
  <body
    x-data="adminUi()"
    class="h-full bg-zinc-950 text-zinc-100 font-sans antialiased"
    @keydown.escape.window="sidebarOpen = false"
  >
    <!-- ── Toast notification ── -->
    <div
      x-show="toast.show"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-y-2"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 translate-y-0"
      x-transition:leave-end="opacity-0 translate-y-2"
      class="fixed top-4 right-4 z-50 px-4 py-3 rounded-xl shadow-2xl text-sm font-semibold flex items-center gap-2 cursor-pointer"
      :class="toast.type === 'success' ? 'bg-green-500 text-zinc-950' : toast.type === 'error' ? 'bg-red-500 text-white' : 'bg-zinc-900 text-zinc-300 border border-zinc-700'"
      @click="toast.show = false"
      x-text="toast.message"
    ></div>

    <!-- ── Mobile sidebar overlay ── -->
    <div
      x-show="sidebarOpen"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="fixed inset-0 z-10 bg-black/50 lg:hidden"
      @click="sidebarOpen = false"
    ></div>

    <!-- ── App shell ── -->
    <div class="flex h-full">
      <!-- ══════════════════ SIDEBAR ══════════════════ -->
      <aside
        class="fixed lg:static inset-y-0 left-0 z-20 w-60 shrink-0 flex flex-col border-r border-zinc-800 bg-zinc-950 -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out"
        :class="sidebarOpen ? 'translate-x-0 shadow-2xl' : ''"
      >
        <!-- Brand -->
        <div class="p-4 border-b border-zinc-800">
          <div class="flex items-center gap-3 mb-4">
            <div
              class="w-8 h-8 rounded-lg bg-gradient-to-br from-green-400 to-green-600 grid place-items-center text-zinc-950 font-extrabold text-xs shadow-sm shadow-green-500/20"
            >
              FC

            </div>
            <span class="font-bold text-sm text-zinc-100 tracking-tight"
              >Free Claude Code</span
            >
          </div>
          <!-- Search -->
          <div class="relative">
            <svg
              class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-zinc-500 pointer-events-none"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
            <input
              type="search"
              x-model="searchQuery"
              placeholder="Search sections…"
              class="w-full h-9 pl-9 pr-3 rounded-lg border border-zinc-800 bg-zinc-900/50 text-sm text-zinc-100 placeholder-zinc-500 outline-none focus:border-green-500/50 focus:ring-1 focus:ring-green-500/20 transition-all"
            />
          </div>
        </div>

        <!-- Nav groups -->
        <nav class="sidebar-nav flex-1 overflow-y-auto p-3 space-y-1">
          <template
            x-for="group in filteredNavGroups(searchQuery)"
            :key="group.label"
          >
            <details class="nav-group" open>
              <summary
                class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg text-[10px] font-bold text-zinc-500 uppercase tracking-wider cursor-pointer hover:text-zinc-300 hover:bg-zinc-800/30 transition-colors"
              >
                <span class="text-sm lowercase" x-text="group.icon"></span>
                <span x-text="group.label"></span>
              </summary>
              <template x-for="secId in group.sections" :key="secId">
                <template x-if="sectionFromId(secId)">
                  <a
                    href="#"
                    class="block px-2 py-1.5 ml-6 rounded-lg text-sm text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/30 transition-colors"
                    :class="activeSection === secId ? 'text-green-400 bg-green-500/10 font-semibold' : ''"
                    x-text="sectionFromId(secId).label"
                    @click.prevent="scrollToSection(secId)"
                  ></a>
                </template>
              </template>
            </details>
          </template>
        </nav>
      </aside>

      <!-- ══════════════════ MAIN ══════════════════ -->
      <main class="flex-1 flex flex-col min-w-0">
        <!-- Mobile topbar -->
        <div
          class="flex lg:hidden items-center justify-between px-4 py-2.5 border-b border-zinc-800 bg-zinc-950"
        >
          <div class="flex items-center gap-2.5">
            <div
              class="w-7 h-7 rounded-lg bg-gradient-to-br from-green-400 to-green-600 grid place-items-center text-zinc-950 font-extrabold text-[11px]"
            >
              FC
            </div>
            <span class="font-bold text-sm text-zinc-100"
              >Free Claude Code</span
            >
          </div>
          <button
            type="button"
            class="px-2 py-1 rounded-lg border border-zinc-800 text-lg text-zinc-300 hover:text-zinc-100 hover:border-zinc-700 transition-colors"
            @click="sidebarOpen = !sidebarOpen"
            aria-label="Toggle menu"
          >
            ☰
          </button>


        </div>

        <!-- Scrollable content area -->
        <div class="flex-1 overflow-y-auto main">
          <div class="max-w-full mx-auto p-5 lg:p-10 space-y-8 pb-28">
            <!-- ── Loading skeleton ── -->
            <div x-show="loading" class="space-y-6 animate-pulse">
              <div
                class="space-y-3 rounded-xl border border-zinc-800 bg-zinc-900 p-6"
              >
                <div class="h-5 bg-zinc-800 rounded w-48"></div>
                <div class="h-3 bg-zinc-800 rounded w-72"></div>
                <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div class="h-10 bg-zinc-800 rounded-lg"></div>
                  <div class="h-10 bg-zinc-800 rounded-lg"></div>
                </div>
                <div class="h-10 bg-zinc-800 rounded-lg"></div>
              </div>
              <div
                class="space-y-3 rounded-xl border border-zinc-800 bg-zinc-900 p-6"
              >
                <div class="h-5 bg-zinc-800 rounded w-56"></div>
                <div class="h-3 bg-zinc-800 rounded w-64"></div>
                <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div class="h-10 bg-zinc-800 rounded-lg"></div>
                  <div class="h-10 bg-zinc-800 rounded-lg"></div>
                </div>
              </div>
              <div
                class="rounded-xl border border-zinc-800 bg-zinc-900 p-5 space-y-3"
              >
                <div class="h-4 bg-zinc-800 rounded w-24"></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                  <div class="h-24 bg-zinc-800 rounded-lg"></div>
                  <div class="h-24 bg-zinc-800 rounded-lg"></div>
                  <div class="h-24 bg-zinc-800 rounded-lg"></div>
                  <div class="h-24 bg-zinc-800 rounded-lg"></div>
                </div>
              </div>
            </div>

            <!-- ── Real content (hidden while loading) ── -->
            <div x-show="!loading" class="space-y-8">
              <!-- ── Model Routing sections ── -->
              <template
                x-for="section in sectionsFor('models')"
                :key="section.id"
              >
                <div class="settings-section" :id="'section-' + section.id">
                  <div class="section-heading mb-5">
                    <h2
                      class="text-lg font-bold text-zinc-100 tracking-tight"
                      x-text="section.label"
                    ></h2>
                    <p
                      class="text-xs text-zinc-500 mt-1 leading-relaxed"
                      x-text="section.description"
                    ></p>
                  </div>
                  <div class="field-grid grid grid-cols-1 md:grid-cols-2 gap-5">
                    <template
                      x-for="field in fieldsForSection(section.id)"
                      :key="field.key"
                    >
                      <template
                        x-if="!field.advanced || showAdvanced[section.id]"
                      >
                        <div class="space-y-1.5">
                          <!-- Label -->
                          <label
                            :for="'fld-' + field.key"
                            class="flex items-center justify-between text-sm font-semibold text-zinc-200"
                          >
                            <span x-text="field.label"></span>
                            <span
                              class="text-[10px] text-zinc-500 font-normal"
                              x-text="sourceText(field)"
                            ></span>
                          </label>

                          <!-- model combobox -->
                          <template
                            x-if="field.type === 'text' && field.key.startsWith('MODEL')"
                          >
                            <div
                              class="relative"
                              @click.outside="combos[field.key] = combos[field.key] || {open:false,idx:-1}; combos[field.key].open = false"
                            >
                              <input
                                :id="'fld-' + field.key"
                                x-model="fieldValues[field.key]"
                                :disabled="field.locked"
                                placeholder="Type to filter models…"
                                @focus="combos[field.key] = combos[field.key] || {open:true,idx:-1}; combos[field.key].open = true"
                                @input="combos[field.key] ? (combos[field.key].open = true, combos[field.key].idx = -1) : (combos[field.key] = {open:true,idx:-1})"
                                @keydown.arrow-down.prevent="comboNav(field.key, 'down')"
                                @keydown.arrow-up.prevent="comboNav(field.key, 'up')"
                                @keydown.enter.prevent="comboSelectActive(field.key)"
                                @keydown.escape="combos[field.key] && (combos[field.key].open = false)"
                                autocomplete="off"
                                :class="errCls(field.key)"
                                class="w-full h-9 px-3 pr-9 rounded-lg border border-zinc-700 bg-zinc-900/70 text-sm text-zinc-100 placeholder-zinc-500 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/30 transition-all disabled:cursor-not-allowed disabled:bg-zinc-900 disabled:text-zinc-600"
                              />
                              <svg
                                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500 pointer-events-none transition-transform"
                                :class="combos[field.key]?.open ? 'rotate-180 text-green-400' : ''"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  stroke-linecap="round"
                                  stroke-linejoin="round"
                                  stroke-width="2"
                                  d="M8 9l4 4 4-4"
                                />
                              </svg>
                              <div
                                x-show="combos[field.key]?.open && filteredModels(field.key).length > 0"
                                x-cloak
                                class="absolute top-full left-0 right-0 z-50 mt-1 max-h-56 overflow-y-auto rounded-xl border border-zinc-700 bg-zinc-900 shadow-2xl shadow-black/50"
                              >
                                <template
                                  x-for="(m, i) in filteredModels(field.key)"
                                  :key="m"
                                >
                                  <div
                                    @click="selectModel(field.key, m)"
                                    @mouseenter="combos[field.key] = combos[field.key] || {open:true,idx:-1}; combos[field.key].idx = i"
                                    class="flex items-center gap-1.5 px-3 py-2.5 text-sm cursor-pointer border-b border-zinc-800 last:border-b-0 transition-colors"
                                    :class="i === combos[field.key]?.idx ? 'bg-green-500/15 text-zinc-100' : 'text-zinc-300 hover:bg-zinc-800/30'"
                                  >
                                    <span
                                      class="text-green-400 font-medium shrink-0"
                                      x-text="m.split('/')[0] + '/'"
                                    ></span>
                                    <span
                                      class="truncate"
                                      x-text="m.split('/').slice(1).join('/')"
                                    ></span>
                                  </div>
                                </template>
                                <div
                                  class="px-3 py-1.5 text-[10px] text-zinc-500 border-t border-zinc-800"
                                  x-text="filteredModels(field.key).length + ' model' + (filteredModels(field.key).length === 1 ? '' : 's')"
                                ></div>
                              </div>
                            </div>
                          </template>

                          <!-- text / number -->
                          <template
                            x-if="(field.type === 'text' && !field.key.startsWith('MODEL')) || field.type === 'number'"
                          >
                            <input
                              :type="field.type === 'number' ? 'number' : 'text'"
                              :id="'fld-' + field.key"
                              x-model="fieldValues[field.key]"
                              :disabled="field.locked"
                              :class="errCls(field.key)"
                              class="w-full h-9 px-3 rounded-lg border border-zinc-700 bg-zinc-900/50 text-sm text-zinc-100 placeholder-zinc-500 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/30 transition-all disabled:cursor-not-allowed disabled:bg-zinc-900 disabled:text-zinc-600"
                            />
                          </template>

                          <!-- secret (with show/hide toggle) -->
                          <template x-if="field.type === 'secret'">
                            <div class="relative">
                              <input
                                :type="showSecrets[field.key] ? 'text' : 'password'"
                                :id="'fld-' + field.key"
                                x-model="fieldValues[field.key]"
                                :placeholder="field.configured ? 'Configured — enter new value to replace' : 'Not configured'"
                                :disabled="field.locked"
                                autocomplete="off"
                                :class="errCls(field.key)"
                                class="w-full h-9 px-3 pr-10 rounded-lg border border-zinc-700 bg-zinc-900/50 text-sm text-zinc-100 placeholder-zinc-500 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/30 transition-all disabled:cursor-not-allowed disabled:bg-zinc-900 disabled:text-zinc-600"
                              />
                              <button
                                type="button"
                                class="absolute right-2 top-1/2 -translate-y-1/2 text-sm text-zinc-500 hover:text-zinc-300 transition-colors"
                                @click="showSecrets[field.key] = !showSecrets[field.key]"
                                x-text="showSecrets[field.key] ? '🙈' : '👁️'"
                              ></button>
                            </div>
                          </template>

                          <!-- boolean (toggle switch) -->
                          <template x-if="field.type === 'boolean'">
                            <button
                              type="button"
                              role="switch"
                              :aria-checked="fieldValues[field.key] === 'true'"
                              @click="toggleField(field.key)"
                              :disabled="field.locked"
                              class="relative inline-flex h-6 w-11 items-center rounded-full border transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-green-500/40 disabled:cursor-not-allowed disabled:opacity-50"
                              :class="fieldValues[field.key] === 'true' ? 'bg-green-500 border-green-500' : 'bg-zinc-800 border-zinc-700'"
                            >
                              <span
                                class="inline-block h-4 w-4 rounded-full bg-white transition-transform duration-200 shadow-sm"
                                :class="fieldValues[field.key] === 'true' ? 'translate-x-[22px]' : 'translate-x-[3px]'"
                              ></span>
                            </button>
                          </template>

                          <!-- tri_boolean -->
                          <template x-if="field.type === 'tri_boolean'">
                            <div class="relative">
                              <select
                                x-model="fieldValues[field.key]"
                                :disabled="field.locked"
                                :class="errCls(field.key)"
                                class="w-full h-9 pl-3 pr-9 rounded-lg border border-zinc-700 bg-zinc-900/70 text-sm text-zinc-100 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/30 transition-all appearance-none cursor-pointer disabled:cursor-not-allowed disabled:opacity-50"
                              >
                                <option value="">Inherit</option>
                                <option value="true">Enabled</option>
                                <option value="false">Disabled</option>
                              </select>
                              <svg
                                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500 pointer-events-none"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  stroke-linecap="round"
                                  stroke-linejoin="round"
                                  stroke-width="2"
                                  d="M8 9l4 4 4-4"
                                />
                              </svg>
                            </div>
                          </template>

                          <!-- select -->
                          <template x-if="field.type === 'select'">
                            <div class="relative">
                              <select
                                x-model="fieldValues[field.key]"
                                :disabled="field.locked"
                                :class="errCls(field.key)"
                                class="w-full h-9 pl-3 pr-9 rounded-lg border border-zinc-700 bg-zinc-900/70 text-sm text-zinc-100 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/30 transition-all appearance-none cursor-pointer disabled:cursor-not-allowed disabled:opacity-50"
                              >
                                <template
                                  x-for="opt in field.options"
                                  :key="opt"
                                >
                                  <option :value="opt" x-text="opt"></option>
                                </template>
                              </select>
                              <svg
                                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500 pointer-events-none"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  stroke-linecap="round"
                                  stroke-linejoin="round"
                                  stroke-width="2"
                                  d="M8 9l4 4 4-4"
                                />
                              </svg>
                            </div>
                          </template>

                          <!-- textarea -->
                          <template x-if="field.type === 'textarea'">
                            <textarea
                              :id="'fld-' + field.key"
                              x-model="fieldValues[field.key]"
                              :disabled="field.locked"
                              :class="errCls(field.key)"
                              class="w-full rounded-lg border border-zinc-700 bg-zinc-900/50 text-sm text-zinc-100 placeholder-zinc-500 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/30 transition-all p-3 min-h-[90px] resize-y disabled:cursor-not-allowed disabled:bg-zinc-900 disabled:text-zinc-600"
                            ></textarea>
                          </template>

                          <!-- description -->
                          <p
                            x-show="field.description"
                            class="text-xs text-zinc-500 leading-relaxed"
                            x-text="field.description"
                          ></p>
                          <p
                            x-show="validationErrors[field.key]"
                            class="text-xs text-red-400"
                            x-text="validationErrors[field.key]"
                          ></p>
                        </div>
                      </template>
                    </template>
                  </div>
                  <!-- Advanced toggle -->
                  <button
                    x-show="hasAdvanced(section.id)"
                    type="button"
                    @click="showAdvanced[section.id] = !showAdvanced[section.id]"
                    class="mt-5 px-3 py-1.5 rounded-lg border border-zinc-700 text-xs font-semibold text-zinc-400 hover:text-zinc-100 hover:border-zinc-500 transition-colors bg-zinc-900"
                    x-text="showAdvanced[section.id] ? 'Hide advanced' : 'Show advanced'"
                  ></button>
                </div>
              </template>

              <!-- ── Provider strip ── -->
              <section class="settings-section" aria-label="Provider status">
                <div class="flex items-center justify-between mb-4">
                  <h3 class="text-sm font-bold text-zinc-100 tracking-tight">
                    Providers
                  </h3>
                  <span
                    class="text-[10px] text-zinc-500"
                    x-text="providerStatus.length + ' configured'"
                  ></span>
                </div>
                <div
                  class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"
                >
                  <template x-for="p in providerStatus" :key="p.provider_id">
                    <div
                      class="provider-card border border-zinc-800 rounded-xl p-3.5 space-y-2.5 hover:border-zinc-700 bg-zinc-900/30"
                    >
                      <div class="flex items-center justify-between gap-2">
                        <span
                          class="text-sm font-semibold text-zinc-100 truncate"
                          x-text="providerName(p.provider_id)"
                        ></span>
                        <span
                          class="shrink-0 text-[10px] font-bold px-2 py-0.5 rounded-full"
                          :class="statusClass(p.status) === 'ok' ? 'text-green-400 border border-green-500/30 bg-green-500/10' : statusClass(p.status) === 'warn' ? 'text-amber-400 border border-amber-500/30 bg-amber-500/10' : statusClass(p.status) === 'error' ? 'text-red-400 border border-red-500/30 bg-red-500/10' : 'text-zinc-500 border border-zinc-700 bg-zinc-800'"
                          x-text="p.label"
                        ></span>
                      </div>
                      <div
                        class="text-xs text-zinc-500 truncate"
                        x-text="p.kind === 'local' ? (p.base_url || 'No local URL configured') : (p.credential_env || '')"
                      ></div>
                      <button
                        type="button"
                        @click="testProvider(p.provider_id)"
                        class="text-xs text-zinc-500 hover:text-zinc-300 transition-colors font-medium"
                        x-text="p.kind === 'local' ? 'Test' : 'Refresh models'"
                      ></button>
                    </div>
                  </template>
                </div>
              </section>

              <!-- ── Provider Config sections ── -->
              <template
                x-for="section in sectionsFor('providers,runtime')"
                :key="'cfg-' + section.id"
              >
                <div class="settings-section" :id="'section-' + section.id">
                  <div class="section-heading mb-5">
                    <h2
                      class="text-lg font-bold text-zinc-100 tracking-tight"
                      x-text="section.label"
                    ></h2>
                    <p
                      class="text-xs text-zinc-500 mt-1 leading-relaxed"
                      x-text="section.description"
                    ></p>
                  </div>
                  <div class="field-grid grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- Same field type template as above -->
                    <template
                      x-for="field in fieldsForSection(section.id)"
                      :key="field.key"
                    >
                      <template
                        x-if="!field.advanced || showAdvanced[section.id]"
                      >
                        <div class="space-y-1.5">
                          <label
                            :for="'fld-' + field.key"
                            class="flex items-center justify-between text-sm font-semibold text-zinc-200"
                          >
                            <span x-text="field.label"></span>
                            <span
                              class="text-[10px] text-zinc-500 font-normal"
                              x-text="sourceText(field)"
                            ></span>
                          </label>

                          <template
                            x-if="field.type === 'text' || field.type === 'number'"
                          >
                            <input
                              :type="field.type === 'number' ? 'number' : 'text'"
                              :id="'fld-' + field.key"
                              x-model="fieldValues[field.key]"
                              :disabled="field.locked"
